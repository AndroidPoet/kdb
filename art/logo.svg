<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="400" fill="#F8F9FA"/>
  <!-- Top accent bar -->
  <rect width="1200" height="4" fill="url(#grad)" />
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1200" y2="0">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>
  <!-- Database/cylinder icon representation -->
  <g transform="translate(600, 130)">
    <!-- Database cylinder -->
    <ellipse cx="0" cy="-35" rx="45" ry="18" fill="#6366F1" opacity="0.9"/>
    <rect x="-45" y="-35" width="90" height="65" fill="#6366F1" opacity="0.6"/>
    <ellipse cx="0" cy="30" rx="45" ry="18" fill="#6366F1" opacity="0.4"/>
    <!-- Inner database lines -->
    <ellipse cx="0" cy="0" rx="40" ry="14" fill="none" stroke="#F8F9FA" stroke-width="1.5" opacity="0.3"/>
    <ellipse cx="0" cy="15" rx="40" ry="14" fill="none" stroke="#F8F9FA" stroke-width="1.5" opacity="0.2"/>
  </g>
  <!-- Title -->
  <text x="600" y="225" text-anchor="middle" fill="#1F2328" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" letter-spacing="-1">KDB</text>
  <!-- Subtitle -->
  <text x="600" y="265" text-anchor="middle" fill="#656D76" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" letter-spacing="0.3">Kotlin Multiplatform SQLite Wrapper</text>
  <!-- Tagline -->
  <text x="600" y="300" text-anchor="middle" fill="#6366F1" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="500" letter-spacing="0.5">Lightweight · Type-safe · Modular</text>
</svg>
